<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Certificados</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .nav {
            display: flex;
            gap: 8px;
            padding: 10px 16px;
            background: #1a1a2e;
            font-family: 'Segoe UI', sans-serif;
        }

        .nav a {
            color: #aaa;
            text-decoration: none;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .nav a:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        .nav a.active {
            color: #fff;
            background: #e94560;
        }
    </style>
</head>

<body>
    <nav class="nav">
        <a href="index.html" class="active">🎓 Certificados</a>
        <a href="rifa.html">🎟️ Rifas</a>
    </nav>
    <div id="container">
        <h1 class="page-header">Certificado</h1>
        <p class="page-text">
            <!-- Texto contido no certificado -->
        </p>
    </div>
</body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"
    integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
    var nomehtml = document.getElementById("nome");

    async function downloadPdf(nomes) {
        const item = document.querySelector("#container");
        item.style.width = "810px !important";
        for (let nome of nomes) {
            var opt = {
                filename: nome + '.pdf',
                image: { type: 'png', quality: 0.98 },
                html2canvas: { scale: 1 },
                jsPDF: { unit: 'in', format: 'A4', orientation: 'landscape' },
            };
            nomehtml.innerHTML = nome;
            await html2pdf().set(opt).from(item).save();
        }
    }
    var nomes = [
    ]

    downloadPdf(nomes);
</script>

</html>
